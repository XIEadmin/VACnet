<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAC 封禁系统 - 官方警告</title>
    <style>
        /* ---------- 全局重置 & Steam 风格 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1b2838;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Motiva Sans", "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            margin: 0;
            overflow: hidden;
            /* 防止滚动条干扰全屏 */
        }

        /* 主卡片 - 像 Steam 的弹窗，同时作为震动对象 */
        .container {
            background: #2a3f5e;
            padding: 40px 50px 30px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            max-width: 780px;
            width: 92%;
            text-align: center;
            border-left: 8px solid #ff0000;
            position: relative;
            transition: transform 0.1s;
            /* 用于震动 */
        }

        /* 震动动画（持续晃动） */
        .shake {
            animation: shakeAnim 0.15s infinite alternate;
        }

        @keyframes shakeAnim {
            0% {
                transform: translateX(-2px) rotate(-0.5deg);
            }

            25% {
                transform: translateX(2px) rotate(0.5deg);
            }

            50% {
                transform: translateX(-1px) rotate(-0.3deg);
            }

            75% {
                transform: translateX(1px) rotate(0.3deg);
            }

            100% {
                transform: translateX(0) rotate(0);
            }
        }

        /* 封禁图标 */
        .vac-icon {
            font-size: 4em;
            margin-bottom: 10px;
            color: #ff0000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        h1 {
            color: #ff0000;
            font-size: 2.8em;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            letter-spacing: 1px;
        }

        h2 {
            color: #ff0000;
            font-size: 1.9em;
            font-weight: 400;
            border-top: 1px solid #4b6b8a;
            padding-top: 15px;
            margin-top: 5px;
            opacity: 0.95;
        }

        /* 倒计时文字 */
        #countdown {
            color: #ffcc00;
            font-size: 1.8em;
            margin: 25px 0 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
            min-height: 3em;
        }

        /* 视频区域 */
        .video-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-area video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            display: none;
            /* 默认隐藏，由 JS 控制显示 */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        /* ---------- 覆盖层弹窗 ---------- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .popup {
            background: #2a3f5e;
            padding: 50px 60px;
            border-radius: 16px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            border: 2px solid #ff0000;
        }

        .popup h1 {
            font-size: 2.4em;
            color: #ff0000;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
        }

        .popup p {
            font-size: 1.2em;
            color: #c7d5e0;
            margin: 15px 0;
            line-height: 1.6;
        }

        .popup button {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 16px 50px;
            font-size: 1.4em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .popup button:hover {
            background: #cc0000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }

        /* ====== 新增：侧边警告提示 ====== */
        #sideWarning {
            position: fixed;
            right: -500px;
            /* 初始在屏幕外 */
            top: 50%;
            transform: translateY(-50%);
            background: rgba(180, 0, 0, 0.95);
            color: #fff;
            padding: 30px 40px;
            border-radius: 12px 0 0 12px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8);
            border-left: 6px solid #ffcc00;
            font-size: 2.8em;
            /* 大字 */
            font-weight: 900;
            text-align: center;
            z-index: 99999;
            transition: right 0.5s ease-out;
            max-width: 380px;
            line-height: 1.3;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            letter-spacing: 1px;
            white-space: pre-line;
            /* 支持换行 */
            font-family: 'Arial Black', 'Impact', sans-serif;
        }

        /* 侧边警告的摇晃（更剧烈） */
        #sideWarning.shake-warning {
            animation: shakeWarning 0.1s infinite alternate;
        }

        @keyframes shakeWarning {
            0% {
                transform: translateY(-50%) translateX(-3px) rotate(-1deg);
            }

            100% {
                transform: translateY(-50%) translateX(3px) rotate(1deg);
            }
        }

        /* 进入屏幕后的位置 */
        #sideWarning.show {
            right: 0;
        }
    </style>
</head>

<body>

    <!-- ====== 覆盖层弹窗 ====== -->
    <div id="overlay">
        <div class="popup">
            <h1>⚠️ VAC 封禁通知</h1>
            <p>您的 Steam 账户已被 <strong>Valve 反作弊系统 (VAC)</strong> 永久封禁。</p>
            <p>点击下方按钮查看详细封禁记录及证据视频。</p>
            <button id="startBtn">查看详情</button>
        </div>
    </div>

    <!-- ====== 主内容 ====== -->
    <div class="container" id="mainContent" style="display:none;">
        <div class="vac-icon">🔒</div>
        <h1>114514个在案的 VAC 封禁</h1>
        <h2>上次封禁于 9178 天前</h2>

        <div id="countdown"></div>

        <div class="video-area">
            <video id="video1" playsinline loop>
                <source src="./UP1.mp4" type="video/mp4">
                您的浏览器不支持视频标签。
            </video>
            <video id="video2" playsinline loop>
                <source src="./UP2.mp4" type="video/mp4">
                您的浏览器不支持视频标签。
            </video>
        </div>
    </div>

    <!-- ====== 侧边警告（初始隐藏） ====== -->
    <div id="sideWarning">
        若不在 5S 内<br>退出网页<br>你会后悔的
    </div>

    <script>
        (function () {
            const overlay = document.getElementById('overlay');
            const main = document.getElementById('mainContent');
            const startBtn = document.getElementById('startBtn');
            const countdownEl = document.getElementById('countdown');
            const video1 = document.getElementById('video1');
            const video2 = document.getElementById('video2');
            const container = document.querySelector('.container');
            const sideWarning = document.getElementById('sideWarning');

            // ---------- 20秒后显示侧边警告 ----------
            let warningTimer = setTimeout(function () {
                // 显示并摇晃
                sideWarning.classList.add('show', 'shake-warning');

                // 5秒后跳转
                setTimeout(function () {
                    window.location.href = 'https://fataity.win/';
                }, 5000);
            }, 20000); // 20秒

            // 点击“查看详情”按钮时，清除20秒定时器（防止干扰），但整蛊还是要继续，可保留
            // 但为了友好，如果用户已经点击，说明开始整蛊，则不必再跳出侧边警告？但题目要求“进入网站20秒后”，无论是否点击都应该触发。
            // 所以即使点击了，20秒后仍然会弹出，保持原逻辑。

            // ---------- 原有功能：点击按钮 ----------
            startBtn.addEventListener('click', function () {
                // 全屏
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.warn('全屏请求被拒绝:', err);
                    });
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                }

                overlay.style.display = 'none';
                main.style.display = 'block';
                container.classList.add('shake');

                let sec = 3;
                countdownEl.textContent = `⏳ 系统将在 ${sec} 秒后播放封禁证据...`;

                const timer = setInterval(function () {
                    sec--;
                    if (sec > 0) {
                        countdownEl.textContent = `⏳ 系统将在 ${sec} 秒后播放封禁证据...`;
                    } else {
                        clearInterval(timer);
                        countdownEl.textContent = '📹 正在播放封禁记录视频...';

                        video1.style.display = 'block';
                        video1.play().catch(e => console.warn('播放UP1被阻止:', e));

                        setTimeout(function () {
                            video2.style.display = 'block';
                            video2.play().catch(e => console.warn('播放UP2被阻止:', e));
                            countdownEl.textContent = '📹 第二段封禁记录播放中...';
                        }, 3000);
                    }
                }, 1000);

                // 点击页面任意处尝试全屏（已存在的监听）
            });

            // 全屏重试监听（点击页面任意处）
            document.addEventListener('click', function () {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => { });
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    }
                }
            });

            // 警告出现后，如果用户点击侧边栏或页面，我们也可考虑取消跳转？但题目要求必须跳转，所以不取消。

        })();
    </script>

</body>

</html>
